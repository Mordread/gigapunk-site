<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GigaPunk</title>
  <meta name="description" content="GigaPunk is an open-source local-first AI development cockpit for coding agents, memory, automation, and self-hosted workflows." />
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #08090d;
      color: #f4f4f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(120, 80, 255, 0.28), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(0, 220, 180, 0.18), transparent 32rem),
        #08090d;
    }

    main {
      max-width: 780px;
    }

    .eyebrow {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #a1a1aa;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.9;
      margin: 0 0 1.25rem;
    }

    p {
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.6;
      color: #d4d4d8;
      margin: 0 0 1.5rem;
    }

    .status {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.65rem 1rem;
      color: #fafafa;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Local-first AI systems</div>
    <h1>GigaPunk</h1>
    <p>
      GigaPunk is an experimental open-source development cockpit for AI-assisted coding,
      agent memory, automation, and self-hosted workflows.
    </p>
    <div class="status">Coming soon</div>
  </main>
</body>
</html>
