<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GigaPunk</title>
  <meta name="description" content="GigaPunk is an experimental local-first AI development cockpit for coding agents, memory, automation, research, and self-hosted workflows." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://gigapunk.net/" />
  <meta property="og:title" content="GigaPunk" />
  <meta property="og:description" content="An experimental local-first AI development cockpit for coding agents, memory, automation, research, and self-hosted workflows." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gigapunk.net/" />
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #08090d;
      color: #f4f4f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(120, 80, 255, 0.28), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(0, 220, 180, 0.18), transparent 32rem),
        #08090d;
    }

    main {
      width: min(100%, 860px);
    }

    .eyebrow {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #a1a1aa;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 0.88;
      margin: 0 0 1.25rem;
    }

    p {
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.6;
      color: #d4d4d8;
      margin: 0 0 1.5rem;
      max-width: 760px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.65rem 1rem;
      color: #fafafa;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
    }

    .note {
      margin-top: 2rem;
      font-size: 0.98rem;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <main>
    <h1>GigaPunk</h1>
    <p>
      GigaPunk is an experimental development cockpit for AI-assisted coding,
      agent memory, automation, research, and self-hosted workflows
    </p>
  </main>
</body>
</html>
